<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Analytics & AI — IVB 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow+Condensed:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030810;--bg2:#060d1c;--bg3:#091224;
  --blue:#2563eb;--b2:#3b82f6;--b3:#93c5fd;
  --acc:#0891b2;--a2:#06b6d4;--a3:#67e8f9;
  --grn:#059669;--g2:#10b981;--g3:#6ee7b7;
  --gold:#d97706;--go2:#f59e0b;--go3:#fcd34d;
  --rose:#e11d48;--r2:#f43f5e;--r3:#fda4af;
  --vio:#7c3aed;--v2:#8b5cf6;--v3:#c4b5fd;
  --tx:#eef2ff;--t2:#94a3b8;--t3:#3d5275;
  --bdr:rgba(59,130,246,0.16);--bd2:rgba(255,255,255,0.055);
  --glass:rgba(9,18,36,0.84);--gl2:rgba(6,13,28,0.94);
  --glow:rgba(37,99,235,0.11);--gw2:rgba(6,182,212,0.08);
  --r:14px;--R:22px;
  --fc:'Barlow Condensed',sans-serif;
  --fs:'Instrument Serif',serif;
  --fm:'DM Mono',monospace;
  --fo:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Outfit',sans-serif;color:var(--tx);}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 45% at 15% 8%,rgba(37,99,235,0.07) 0%,transparent 55%),
    radial-gradient(ellipse 50% 35% at 85% 92%,rgba(6,182,212,0.05) 0%,transparent 55%),
    linear-gradient(rgba(59,130,246,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.022) 1px,transparent 1px);
  background-size:100%,100%,56px 56px,56px 56px;pointer-events:none;}
#bar{position:fixed;top:0;left:0;height:2.5px;z-index:300;
  background:linear-gradient(90deg,var(--blue),var(--a2),var(--grn));
  transition:width .45s cubic-bezier(.4,0,.2,1);}
#dnav{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:5px;}
.dp{padding:5px 15px;border-radius:100px;border:1px solid var(--bd2);background:var(--gl2);
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;color:var(--t3);cursor:pointer;transition:all .2s;}
.dp:hover{border-color:var(--bdr);color:var(--t2);}
.dp.on{background:var(--glow);border-color:var(--bdr);color:var(--b3);}
#ctrl{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;
  display:flex;align-items:center;gap:10px;background:var(--gl2);border:1px solid var(--bdr);
  backdrop-filter:blur(28px);border-radius:100px;padding:7px 16px;}
.cb{width:32px;height:32px;border-radius:50%;background:var(--glow);border:1px solid var(--bdr);
  color:var(--tx);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-family:inherit;}
.cb:hover{background:var(--blue);}
#sc{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);min-width:52px;text-align:center;}
#kh{position:fixed;bottom:22px;right:22px;z-index:200;font-size:10px;color:var(--t3);display:flex;gap:5px;align-items:center;}
.kk{padding:2px 6px;border-radius:4px;background:var(--gl2);border:1px solid var(--bd2);font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);}
#deck{position:fixed;inset:0;z-index:10;}
.slide{position:absolute;inset:0;opacity:0;pointer-events:none;
  transform:translateX(64px) scale(.985);
  transition:opacity .4s cubic-bezier(.4,0,.2,1),transform .4s cubic-bezier(.4,0,.2,1);}
.slide.on{opacity:1;pointer-events:all;transform:none;}
.slide.out{opacity:0;transform:translateX(-64px) scale(.985);}
.si{position:absolute;inset:0;padding:64px 68px 76px;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.si::-webkit-scrollbar{width:3px;}
.si::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}

/* Typography */
.eye{display:inline-flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--b3);margin-bottom:12px;}
.eye::before{content:'';width:18px;height:1.5px;background:var(--b3);}
.sh{font-weight:700;font-size:clamp(28px,3.6vw,44px);line-height:1.1;color:var(--tx);}
.sh-sub{font-size:14.5px;color:var(--t2);margin-top:10px;line-height:1.65;max-width:620px;}

/* Components */
.gc{background:var(--glass);border:1px solid var(--bd2);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;}
.gc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.3),transparent);}
.gc h3{font-size:14.5px;font-weight:600;color:var(--tx);margin-bottom:7px;}
.gc p{font-size:12.5px;color:var(--t2);line-height:1.7;}
.gc ul{list-style:none;}
.gc ul li{font-size:12.5px;color:var(--t2);padding:5px 0;display:flex;gap:8px;border-bottom:1px solid var(--bd2);}
.gc ul li:last-child{border-bottom:none;}
.gc ul li::before{content:'›';color:var(--b3);flex-shrink:0;}
.ac{background:linear-gradient(135deg,rgba(12,22,44,.96),rgba(7,14,28,.96));border:1px solid var(--bdr);border-radius:var(--r);padding:20px;}
.ac-badge{display:inline-block;padding:3px 9px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.28);border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--a2);text-transform:uppercase;margin-bottom:10px;}
.ac h3{font-size:14.5px;font-weight:600;color:var(--tx);margin-bottom:7px;}
.ac p{font-size:12.5px;color:var(--t2);line-height:1.7;}
.pill{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;}
.pb{background:rgba(59,130,246,.12);color:var(--b3);border:1px solid var(--bdr);}
.pg{background:rgba(16,185,129,.1);color:var(--g3);border:1px solid rgba(16,185,129,.22);}
.pa{background:rgba(245,158,11,.1);color:var(--go3);border:1px solid rgba(245,158,11,.22);}
.pr{background:rgba(244,63,94,.1);color:var(--r3);border:1px solid rgba(244,63,94,.22);}
.pv{background:rgba(139,92,246,.1);color:var(--v3);border:1px solid rgba(139,92,246,.22);}
.pc{background:rgba(6,182,212,.1);color:var(--a3);border:1px solid rgba(6,182,212,.22);}
.sbox{background:var(--glass);border:1px solid var(--bd2);border-radius:var(--r);padding:18px 20px;}
.sn{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1;background:linear-gradient(135deg,#fff,var(--b3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sl{font-size:11px;color:var(--t3);margin-top:5px;line-height:1.4;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
.xp{background:linear-gradient(135deg,rgba(37,99,235,.1),rgba(6,182,212,.06));border:1px solid var(--bdr);border-left:3px solid var(--b2);border-radius:var(--r);padding:14px 18px;margin-top:12px;display:flex;align-items:flex-start;gap:10px;}
.xp-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.xp-txt{font-size:12.5px;color:var(--t2);line-height:1.65;}
.xp-txt strong{color:var(--b3);font-weight:600;}
.close{background:linear-gradient(135deg,rgba(37,99,235,.08),rgba(6,182,212,.04));border:1px solid var(--bdr);border-left:4px solid var(--g2);border-radius:var(--r);padding:20px 26px;}
.close-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g2);margin-bottom:8px;}
.close-txt{font-size:13.5px;color:var(--tx);line-height:1.7;}
.close-txt strong{color:var(--b3);font-weight:500;}
.qbox{background:var(--glow);border-left:3px solid var(--b2);border-radius:0 10px 10px 0;padding:14px 18px;}
.qbox p{font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;color:var(--tx);line-height:1.6;}
.mcp{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--R);padding:24px;}
.mcp-h{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
.mcp-ico{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,rgba(6,182,212,.14),rgba(37,99,235,.14));border:1px solid rgba(6,182,212,.28);display:flex;align-items:center;justify-content:center;font-size:18px;}
.mcp-ti{font-size:17px;font-weight:700;color:var(--tx);}
.mcp-su{font-size:11px;color:var(--t3);}
.mcp-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:9px;}
.mcp-s{background:var(--glass);border:1px solid var(--bd2);border-radius:9px;padding:12px;}
.mcp-sn{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--a2);margin-bottom:5px;}
.mcp-s p{font-size:11.5px;color:var(--t2);line-height:1.6;}
.tl{display:flex;flex-direction:column;}
.tl-row{display:flex;gap:16px;padding-bottom:16px;}
.tl-row:last-child{padding-bottom:0;}
.tl-l{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0;}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--b2);border:2px solid var(--bg);box-shadow:0 0 0 3px var(--glow);z-index:1;}
.tl-line{width:1.5px;flex:1;background:var(--bd2);margin-top:4px;}
.tl-row:last-child .tl-line{display:none;}
.tl-body{background:var(--glass);border:1px solid var(--bd2);border-radius:11px;padding:13px 16px;flex:1;}
.tl-step{font-family:'Barlow Condensed',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.tl-h{font-size:14.5px;font-weight:600;color:var(--tx);margin-bottom:5px;}
.tl-p{font-size:12px;color:var(--t2);line-height:1.65;}
.cod{font-family:'DM Mono',monospace;font-size:11px;padding:2px 7px;background:rgba(59,130,246,.12);border-radius:4px;color:var(--b3);border:1px solid var(--bdr);}
.t{width:100%;border-collapse:collapse;font-size:12.5px;}
.t th{padding:10px 13px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--bdr);text-align:left;}
.t td{padding:10px 13px;color:var(--t2);border-bottom:1px solid var(--bd2);vertical-align:top;}
.t tr:hover td{background:rgba(37,99,235,.04);}
.t td:first-child{color:var(--tx);font-weight:500;}

/* Cover */
.cover{display:flex;height:100%;padding:64px 72px;}
.cover-l{flex:1;display:flex;flex-direction:column;justify-content:center;}
.cover-r{width:300px;display:flex;flex-direction:column;justify-content:center;padding-left:48px;border-left:1px solid var(--bd2);}
.c-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--b3);margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.c-tag::after{content:'';flex:1;height:1px;background:var(--bdr);}
.c-h1{font-family:'Instrument Serif',serif;font-size:clamp(50px,7vw,88px);line-height:.95;color:var(--tx);margin-bottom:20px;}
.c-h1 em{font-style:italic;background:linear-gradient(110deg,var(--b2),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.c-sub{font-size:16px;color:var(--t2);max-width:480px;line-height:1.7;margin-bottom:36px;}
.mc{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(--glass);border:1px solid var(--bd2);border-radius:11px;font-size:12.5px;color:var(--t2);margin-bottom:8px;}

/* Day divider */
.dd{display:flex;height:100%;}
.dd-l{flex:1;display:flex;flex-direction:column;justify-content:center;padding:64px;}
.dd-r{width:360px;display:flex;flex-direction:column;justify-content:center;padding:36px;border-left:1px solid var(--bd2);background:rgba(6,12,24,.5);}
.dd-n{font-family:'Barlow Condensed',sans-serif;font-size:150px;font-weight:900;line-height:.85;letter-spacing:-.04em;background:linear-gradient(135deg,rgba(59,130,246,.22),rgba(6,182,212,.08));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.dd-h{font-family:'Instrument Serif',serif;font-size:clamp(38px,5vw,60px);line-height:1.05;color:var(--tx);margin-bottom:10px;}
.dd-h em{font-style:italic;background:linear-gradient(110deg,var(--b2),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ag-list{display:flex;flex-direction:column;gap:5px;}
.ag{display:flex;gap:10px;padding:8px 11px;background:var(--glass);border:1px solid var(--bd2);border-radius:8px;font-size:11.5px;}
.ag-t{font-family:'DM Mono',monospace;color:var(--t3);min-width:72px;font-size:10.5px;}
.ag-v{color:var(--t2);}

/* Case study */
.cs-wrap{position:absolute;inset:0;padding:52px 62px 68px;display:flex;flex-direction:column;}
.cs-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.cs-type{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
.cs-ent{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.28);color:var(--v3);}
.cs-sta{background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.28);color:var(--g3);}
.cs-body{display:grid;grid-template-columns:300px 1fr;gap:0;flex:1;min-height:0;border:1px solid var(--bdr);border-radius:var(--R);overflow:hidden;}
.cs-l{background:var(--bg3);padding:28px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--bd2);}
.cs-r{display:flex;flex-direction:column;overflow-y:auto;}
.cs-r::-webkit-scrollbar{width:3px;}
.cs-r::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}
.cs-logo{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.cs-ico{width:50px;height:50px;border-radius:13px;background:var(--glow);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.cs-co{font-family:'Instrument Serif',serif;font-size:26px;color:var(--tx);line-height:1;}
.cs-ind{font-size:10.5px;color:var(--t3);margin-top:3px;}
.cs-hl{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(16px,2vw,21px);color:var(--tx);line-height:1.25;margin-bottom:14px;}
.cs-res{background:linear-gradient(135deg,rgba(37,99,235,.12),rgba(6,182,212,.06));border:1px solid var(--bdr);border-radius:12px;padding:18px;}
.cs-rn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:64px;line-height:.9;letter-spacing:-.02em;background:linear-gradient(110deg,#fff,var(--b3),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cs-ru{font-size:12px;color:var(--t2);margin-top:7px;line-height:1.5;}
.cs-panel{padding:18px 24px;border-bottom:1px solid var(--bd2);}
.cs-panel:last-child{border-bottom:none;}
.cs-ptag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.dot-r{width:6px;height:6px;border-radius:50%;background:var(--r2);flex-shrink:0;}
.dot-a{width:6px;height:6px;border-radius:50%;background:var(--go2);flex-shrink:0;}
.dot-b{width:6px;height:6px;border-radius:50%;background:var(--b2);flex-shrink:0;}
.dot-g{width:6px;height:6px;border-radius:50%;background:var(--g2);flex-shrink:0;}
.cs-panel h4{font-size:14.5px;font-weight:600;color:var(--tx);margin-bottom:7px;}
.cs-panel p{font-size:12.5px;color:var(--t2);line-height:1.7;}
.cs-panel p strong{color:var(--tx);font-weight:600;}
.verdict{background:linear-gradient(90deg,rgba(37,99,235,.13),rgba(6,182,212,.07));border-top:1px solid var(--bdr);padding:14px 24px;display:flex;align-items:flex-start;gap:10px;}
.vt{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--go2);flex-shrink:0;padding-top:1px;}
.vp{font-size:12.5px;color:var(--t2);line-height:1.6;}
.vp strong{color:var(--b3);}

/* Interactive */
.sim-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--R);overflow:hidden;}
.sim-head{padding:14px 20px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;gap:10px;}
.sim-title{font-size:14px;font-weight:600;color:var(--tx);}
.sim-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--a2);padding:3px 9px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.25);border-radius:4px;}
.sim-body{padding:18px 20px;}
.opt-btn{display:inline-block;padding:10px 14px;border-radius:10px;border:1px solid var(--bd2);background:var(--glass);color:var(--t2);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12.5px;transition:all .2s;margin:4px;vertical-align:top;}
.opt-btn:hover{border-color:var(--bdr);color:var(--tx);}
.opt-btn.right{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:var(--g3);}
.opt-btn.wrong{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.35);color:var(--r3);}
.opt-btn.neutral-pick{background:rgba(37,99,235,.1);border-color:var(--bdr);color:var(--b3);}
.opt-result{margin-top:12px;padding:14px 18px;border-radius:10px;font-size:13px;line-height:1.65;display:none;color:var(--t2);}
.opt-result.show{display:block;}
.opt-result.good{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:var(--g3);}
.opt-result.bad{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.22);color:var(--r3);}
.opt-result.info{background:rgba(37,99,235,.08);border:1px solid var(--bdr);color:var(--b3);}
.reset-btn{margin-top:8px;padding:6px 14px;border-radius:7px;border:1px solid var(--bd2);background:transparent;color:var(--t3);cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;}
.reset-btn:hover{border-color:var(--bdr);color:var(--t2);}
.funnel-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;}
.fb-label{font-size:11.5px;color:var(--t2);min-width:110px;}
.fb-track{height:32px;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:600;color:#fff;transition:all .3s;min-width:50px;}
.fb-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--b3);min-width:36px;text-align:right;}
.fb-detail{display:none;padding:10px 14px;background:var(--glow);border-radius:8px;margin-bottom:8px;font-size:12px;color:var(--t2);line-height:1.6;border:1px solid var(--bdr);}
.fb-detail.show{display:block;}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;background:rgba(59,130,246,.2);border-radius:3px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--b2);cursor:pointer;border:2px solid var(--bg);}
.attr-bar-wrap{height:22px;border-radius:4px;margin-bottom:7px;display:flex;overflow:hidden;border:1px solid var(--bd2);}
.attr-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:width .5s ease;overflow:hidden;white-space:nowrap;}
</style>
</head>
<body>
<div id="bar"></div>
<div id="dnav">

  '<div class="gc" style="padding:13px;"><div style="font-size:10px;font-weight:700;font-family:var(--fc);letter-spacing:.12em;text-transform:uppercase;color:var(--b3);margin-bottom:4px;">Event</div><div style="font-size:12px;color:var(--t2);line-height:1.6;">Any user action, named as <span class="cod">verb_noun</span>. E.g. <span class="cod">purchase_completed</span>, <span class="cod">video_played</span>. Everything in Mixpanel flows from events. The schema you design here is your product strategy.</div></div>' +

  '<div class="gc" style="padding:13px;"><div style="font-size:10px;font-weight:700;font-family:var(--fc);letter-spacing:.12em;text-transform:uppercase;color:var(--b3);margin-bottom:4px;">Retention</div><div style="font-size:12px;color:var(--t2);line-height:1.6;"><strong>N-day:</strong> did user return on exactly Day N? <strong>Unbounded:</strong> did user return any time after Day N? <strong>Bracket:</strong> did user return within Week 2? Choose based on your product&rsquo;s natural usage frequency.</div></div>' +

  '<div class="sh-sub">You don&rsquo;t need to know the math. You need to know the decisions &mdash; and the limits that will cost you if you ignore them.</div></div>' +
  '<div class="g2" style="margin-bottom:14px;">' +
    '<div style="display:flex;flex-direction:column;gap:10px;">' +
      '<div class="gc"><h3>The Three Ways to Use an LLM</h3>' +
        '<div style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.18);border-radius:8px;padding:11px 14px;margin-bottom:6px;"><div style="font-size:10px;font-weight:700;font-family:var(--fc);letter-spacing:.12em;text-transform:uppercase;color:var(--g3);margin-bottom:4px;">1. Prompt Engineering &mdash; Start Here Always</div><div style="font-size:12px;color:var(--t2);">Give the base model carefully crafted instructions. No training. Costs pennies per query. Covers 80% of use cases. kwik.AI started with pure prompting &mdash; worked in week 1.</div></div>' +
        '<div style="background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.18);border-radius:8px;padding:11px 14px;margin-bottom:6px;"><div style="font-size:10px;font-weight:700;font-family:var(--fc);letter-spacing:.12em;text-transform:uppercase;color:var(--b3);margin-bottom:4px;">2. RAG &mdash; Ground the LLM in Your Own Data</div><div style="font-size:12px;color:var(--t2);">Retrieve relevant docs, feed them as context before generation. Solves hallucination for knowledge-heavy tasks. Use when your knowledge changes frequently &mdash; pricing, policies, product docs.</div></div>' +
        '<div style="background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.18);border-radius:8px;padding:11px 14px;"><div style="font-size:10px;font-weight:700;font-family:var(--fc);letter-spacing:.12em;text-transform:uppercase;color:var(--v3);margin-bottom:4px;">3. Fine-Tuning &mdash; Last Resort</div><div style="font-size:12px;color:var(--t2);">Retrain the model on proprietary data to change behaviour or style. Expensive, slow, needs thousands of examples. Use only when prompt engineering + RAG can&rsquo;t get you there at scale.</div></div>' +
      '</div>' +
      '<div class="gc"><h3>LLM Failure Modes PMs Must Know</h3><ul>' +
        '<li><strong>Hallucination:</strong> confident-sounding but false output. Mitigate with RAG and output validation.</li>' +
        '<li><strong>Prompt injection:</strong> malicious inputs that hijack the AI. A security problem, not just UX.</li>' +
        '<li><strong>Latency:</strong> 2&ndash;8 seconds. Stream tokens progressively to mask this (like ChatGPT does).</li>' +

    '<div style="display:flex;flex-direction:column;gap:10px;">' +
      '<div class="gc"><h3>Context Window &mdash; Why PMs Care</h3><p style="margin-bottom:8px;">The context window is how much the model can read in one request &mdash; its &ldquo;short-term memory.&rdquo;</p><ul>' +

/* ── 21 AI PM FRAMEWORK ── */
s(3, '<div class="si">' +
  '<div style="margin-bottom:16px;"><div class="eye">Framework</div>' +
  '<div class="sh">5 Questions Before <span style="background:linear-gradient(110deg,var(--b2),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Any AI Feature</span></div>' +
  '<div class="sh-sub">Answer these before any ML feature is greenlit. Get them wrong and you&rsquo;ll ship something that erodes user trust &mdash; or never ships at all.</div></div>' +
  '<div class="tl">' +
    '<div class="tl-row"><div class="tl-l"><div class="tl-dot"></div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-step">Q1</div><div class="tl-h">Is ML the Right Tool?</div><div class="tl-p">Use ML when patterns are too complex for rules, volume makes manual impossible, or you need the system to improve over time. Use rules when logic is simple and explicit. <strong>At GoKwik:</strong> &ldquo;Flag COD if order &gt;&#8377;5,000&rdquo; = rule. &ldquo;Predict RTO probability from 40 behavioral signals&rdquo; = ML. Never use ML to sound impressive.</div></div></div>' +
    '<div class="tl-row"><div class="tl-l"><div class="tl-dot"></div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-step">Q2</div><div class="tl-h">Do We Have the Right Data?</div><div class="tl-p">Labelled examples? Historical bias? Enough volume (10K+ examples for most models)? Is the data fresh? At GoKwik, our training data had 18-month-old fraud patterns &mdash; new fraud tactics weren&rsquo;t represented. The model was 70% accurate on historical data, 52% on live data. <strong>Data freshness cost us two months.</strong></div></div></div>' +
    '<div class="tl-row"><div class="tl-l"><div class="tl-dot"></div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-step">Q3</div><div class="tl-h">How Do We Define Success?</div><div class="tl-p"><strong>Precision</strong> = of orders flagged as fraudulent, how many actually were? <strong>Recall</strong> = of all fraud, how much did we catch? In fraud: recall matters most &mdash; missed fraud is a real loss. In recommendations: precision matters &mdash; irrelevant suggestions erode trust. Choose your tradeoff deliberately.</div></div></div>' +
    '<div class="tl-row"><div class="tl-l"><div class="tl-dot"></div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-step">Q4</div><div class="tl-h">What&rsquo;s the Fallback?</div><div class="tl-p">Never ship binary AI. At GoKwik: &gt;90% confidence = auto-intervention, 60&ndash;90% = soft nudge, &lt;60% = observe. This three-band design prevented both false-positive crises and false-negative failures from becoming catastrophic. <strong>Design the fallback before you design the model.</strong></div></div></div>' +

var deck = document.getElementById('deck');
var cur = 0;
var dayStarts = [0, 3, 13, 22];

slides.forEach(function(slide, i) {
  var el = document.createElement('div');
  el.className = 'slide' + (i === 0 ? ' on' : '');
  el.innerHTML = slide.h;
  deck.appendChild(el);
});

function go(n) {
  if (n < 0 || n >= slides.length) return;
  var all = document.querySelectorAll('.slide');
  all[cur].classList.remove('on');
  all[cur].classList.add('out');
  var prev = cur;
  setTimeout(function() { all[prev].classList.remove('out'); }, 400);
  cur = n;
  all[cur].classList.add('on');
  var si = all[cur].querySelector('.si');
  if (si) si.scrollTop = 0;
  updateUI();
}

function updateUI() {
  document.getElementById('sc').textContent = (cur + 1) + ' / ' + slides.length;
  document.getElementById('bar').style.width = ((cur + 1) / slides.length * 100) + '%';
  var d = slides[cur].d;
  document.querySelectorAll('.dp').forEach(function(p, i) {
    p.classList.toggle('on', i === d);
  });
}

document.getElementById('nb').onclick = function() { go(Math.min(cur + 1, slides.length - 1)); };
document.getElementById('pb').onclick = function() { go(Math.max(cur - 1, 0)); };

document.querySelectorAll('.dp').forEach(function(p, i) {
  p.addEventListener('click', function() { go(dayStarts[i]); });
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(Math.min(cur + 1, slides.length - 1));
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(Math.max(cur - 1, 0));
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

var swipeX = 0;
deck.addEventListener('touchstart', function(e) { swipeX = e.touches[0].clientX; }, { passive: true });
deck.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - swipeX;
  if (Math.abs(dx) > 50) dx > 0 ? go(Math.max(cur - 1, 0)) : go(Math.min(cur + 1, slides.length - 1));
});

  hs: {
    0: { cls: 'info', txt: 'Valid but premature. Infrastructure checks are important but should be step 2. If the site were down, you\'d already know from alerts and customer complaints flooding in. Start with the funnel to understand the pattern of the drop — is it across the whole funnel or at a specific step? That tells you whether it\'s infra, UX, or traffic.' },
    1: { cls: 'good', txt: 'Correct first move. The funnel tells you: is traffic down (demand problem) or is conversion down (product problem)? If both traffic and conversion are healthy at top of funnel but drop at payment — it\'s a payment gateway or UX bug. If traffic dropped at session_start — it\'s acquisition. This single chart narrows the diagnosis from 10 possible causes to 2.' },
    2: { cls: 'info', txt: 'Right instinct, wrong order. Traffic source analysis is step 2, not step 1. First confirm whether this is a traffic problem or a conversion problem using the funnel. If top-of-funnel traffic is unchanged but orders dropped, looking at traffic sources will not help — the problem is downstream in the purchase journey.' },
    3: { cls: 'bad', txt: 'Competitor analysis is week-level strategy, not a 5-minute crisis diagnostic. Even if a competitor is running a sale, that does not help you fix a 30% drop internally. Aman needs to know: is this our website breaking, or is demand down? Answer that first with data, then layer in competitive context.' }
  },
  amz: {
    0: { cls: 'info', txt: 'Too aggressive. At 60% confidence you\'d move enormous inventory volumes with 40% wasted. The logistics cost would outweigh the delivery improvement. Amazon found that below 80% confidence the economics broke down.' },
    1: { cls: 'good', txt: 'This is Amazon\'s actual threshold. At 92%, items are almost certainly going to be ordered. Items that are not ordered within the window get rerouted to high-velocity regional hubs rather than returned to source — so even the misses create value. This design made the economics work.' },
    2: { cls: 'info', txt: 'Reasonable but suboptimal. 75% gets broader coverage but more waste. Amazon found that below about 85% the economics of wasted shipping exceeded the savings from faster delivery. A good starting point for testing — but you would tighten from there using real cost data.' },
    3: { cls: 'bad', txt: 'Too conservative. At 99% confidence, barely any inventory would move — volume too small to materially improve delivery times. The value proposition requires scale: pre-positioning thousands of SKUs across hundreds of regional hubs.' }
  }
};

function pickOpt(simId, idx) {
  var data = simData[simId];
  if (!data || !data[idx]) return;
  var opts = document.querySelectorAll('[data-sim="' + simId + '"]');
  var result = document.getElementById(simId + '-result');
  opts.forEach(function(btn, j) {
    btn.className = 'opt-btn';
    if (j === parseInt(idx)) {
      btn.classList.add(data[idx].cls === 'good' ? 'right' : data[idx].cls === 'bad' ? 'wrong' : 'neutral-pick');
    }
  });
  result.innerHTML = data[idx].txt;
  result.className = 'opt-result show ' + data[idx].cls;
}

window.resetSim = function(simId) {
  var opts = document.querySelectorAll('[data-sim="' + simId + '"]');
  opts.forEach(function(btn) { btn.className = 'opt-btn'; });
  var result = document.getElementById(simId + '-result');
  result.className = 'opt-result';
  result.innerHTML = '';
}

/* Delegate click for scenario buttons */
deck.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-sim]');
  if (btn) {
    pickOpt(btn.getAttribute('data-sim'), btn.getAttribute('data-idx'));
  }
});

/* Attribution model comparator */
var attrData = {
  last:   { title: 'Last Click &mdash; Default Before GA4', segs: [0, 0, 100], out: '100% credit to Google Search &mdash; the last touchpoint. YouTube and Instagram get zero credit despite being in the journey. This makes Search look like your best channel. But it\'s just the tollbooth &mdash; it\'s harvesting demand that YouTube and Instagram built.' },
  first:  { title: 'First Click &mdash; Rewards Awareness', segs: [100, 0, 0], out: '100% credit to YouTube. Ignores everything after. Great for understanding what creates initial awareness, terrible for understanding what converts. Useful for top-of-funnel budget decisions only.' },
  linear: { title: 'Linear &mdash; Splits Credit Equally', segs: [33, 33, 34], out: 'Equal credit to all 3 touchpoints. Simple, democratic, but not accurate. Treats a 30-second scroll past an Instagram ad the same as an intent-driven Search click. Better than last-click but still arbitrary.' },
  tdecay: { title: 'Time Decay &mdash; Rewards Recency', segs: [10, 20, 70], out: 'Search gets most credit because it happened last. YouTube gets very little because it was furthest back. Similar bias to last-click but slightly more generous to mid-funnel. Still undervalues long-cycle awareness channels.' },
  ddm:    { title: 'Data-Driven Attribution (GA4 ML Default)', segs: [28, 22, 50], out: 'GA4\'s ML model assigns credit based on each touchpoint\'s true contribution. Search gets most credit because it captures intent already built by YouTube. YouTube gets more than zero because it appeared in high-converting journeys.' }
};

window.showAttr = function(key, btn) {
  var d = attrData[key];
  if (!d) return;
  document.getElementById('attr-title').innerHTML = d.title;
  var segs = ['at-yt','at-ig','at-gs'];
  var labels = ['YouTube ','Insta ','Search '];
  segs.forEach(function(id, i) {
    var el = document.getElementById(id);
    if (el) { el.style.width = d.segs[i] + '%'; el.textContent = d.segs[i] > 5 ? labels[i] + d.segs[i] + '%' : ''; }
  });
  var out = document.getElementById('attr-out');
  out.innerHTML = d.out;
  out.className = 'opt-result show info';
  document.querySelectorAll('.sim-box .opt-btn').forEach(function(b) { b.classList.remove('right'); });
  if (btn) btn.classList.add('right');
}

/* Confidence threshold simulator */
window.updateConf = function() {
  var t = parseInt(document.getElementById('conf-slid').value);
  document.getElementById('conf-val').textContent = t + '%';
  var totalFraud = 80, totalLegit = 920;
  var recall = Math.min(0.96, Math.max(0.18, 1.22 - (t / 76)));
  var fpr = Math.max(0.004, Math.min(0.14, (100 - t) / 480));
  var caughtF = Math.round(totalFraud * recall);
  var missedF = totalFraud - caughtF;
  var fp = Math.round(totalLegit * fpr);
  var ok = totalLegit - fp;
  document.getElementById('c-caught').textContent = caughtF;
  document.getElementById('c-missed').textContent = missedF;
  document.getElementById('c-fp').textContent = fp;
  document.getElementById('c-ok').textContent = ok;
  var msg, cls;
  if (t > 85) {
    msg = 'Very strict threshold. You catch ' + caughtF + '/80 fraudulent orders &mdash; but you\'re blocking ' + fp + ' legitimate customers. At this level, merchant complaints about "good customers being blocked" will spike. High precision, low recall.';
    cls = 'info';
  } else if (t > 60) {
    msg = 'Balanced threshold. ' + caughtF + ' fraud caught, ' + fp + ' false positives. This is roughly GoKwik\'s production configuration. The three-band system means the ' + fp + ' "blocked" orders get a friction screen &mdash; not a hard block &mdash; so many still complete the order.';
    cls = 'good';
  } else {
    msg = 'Loose threshold. Catching ' + caughtF + '/80 fraudsters but missing ' + missedF + ' real frauds. If each costs \u20b9800 in lost inventory + reverse logistics, you\'re losing \u20b9' + (missedF * 800) + '/day on missed fraud alone. Consider tightening or adding a middle band.';
    cls = 'bad';
  }
  var out = document.getElementById('conf-out');
  out.innerHTML = msg;
  out.className = 'opt-result show ' + cls;
}

/* Init */
updateUI();

})();
